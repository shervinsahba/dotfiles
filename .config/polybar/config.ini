;; Global WM Settings

[global/wm]
; Used for top/bottom bars (adjusts _NET_WM_STRUT_PARTIAL top)
margin-bottom = 0
margin-top = 0


;; File Inclusion

include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini
include-file = ~/.config/polybar/user_modules.ini
include-file = ~/.config/polybar/bars.ini

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

;; Bar Settings

[bar/main]
; use either of the following command to list available outputs
; or polybar will choose the first it finds
; $ polybar -m | cut -d ':' -f 1
; $ xrandr -q | grep " connected" | cut -d ' ' -f1

monitor =
monitor-fallback =

; Require the monitor to be in connected state
; XRandR sometimes reports monitor as disconnected (when in use)

monitor-strict = false

; Tell the Window Manager not to configure the window.
; Use this to detach the bar if your WM is locking its size/position.

override-redirect = true

; Put the bar at the bottom of the screen

bottom = false

; Prefer fixed center position for the `modules-center` block
; When false, the center position will be based on the size of the other blocks.

fixed-center = true

; Dimensions -  defined as pixel or percentage
; the percentage can optionally be extended with a pixel offset like 50%:-10

width = 100%
height = 20
offset-x = 0%
offset-y = 0%
padding-left = 0
padding-right = 0

; Colors as ARGB color (e.g. #f00, #ff992a, #ddff1023)

background = ${color.bg}
foreground = ${color.fg}

; Background gradient (vertical steps)
;   background-[0-9]+ = #aarrggbb
;;background-0 =

; Value used for drawing rounded corners
; Note: This shouldn't be used together with border-size because the border doesn't get rounded

radius-top = 0.0
radius-bottom = 0.0

; Under-/overline pixel size and argb color
; Individual values can be defined using:
;   {overline,underline}-size
;   {overline,underline}-color

overline-size = 2
overline-color = ${color.ac}

; Values applied to all borders
; Individual side values can be defined using:
;   border-{left,top,right,bottom}-size
;   border-{left,top,right,bottom}-color
; The top and bottom borders are added to the bar height, so the effective window height is: height + border-top-size + border-bottom-size
; Meanwhile the effective window width is defined entirely by the width key and the border is placed withing this area. So you effectively only have: width - border-right-size - border-left-size

border-bottom-size = 0
border-color = ${color.ac}

; Number of spaces to add before/after each module

module-margin-left = 0
module-margin-right = 0

; Fonts are defined using <font-name>;<vertical-offset>
; Font names are specified using a fontconfig pattern.

; Text Fonts
font-0 = FiraCode Nerd Font:style=Regular:size=11;3

; Icons Fonts
font-1 = icomoon\-feather:style=Medium:size=11;3

; Powerline Glyphs
font-2 = Iosevka Nerd Font Mono:style=Medium:size=16;3

; Larger font size for bar fill icons
font-3 = Iosevka Nerd Font:style=Medium:size=14;3

; Smaller font size for shorter spaces
font-4 = Iosevka Nerd Font Mono:style=Medium:size=6;3


